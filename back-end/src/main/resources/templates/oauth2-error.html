<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAuth2 Login Error</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 100%;
        padding: 40px;
        text-align: center;
      }

      .error-icon {
        font-size: 64px;
        margin-bottom: 20px;
      }

      h1 {
        color: #e53e3e;
        margin-bottom: 10px;
        font-size: 28px;
      }

      .error-message {
        color: #718096;
        margin-bottom: 30px;
        font-size: 16px;
        line-height: 1.6;
      }

      .back-btn {
        background: #667eea;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        text-decoration: none;
        display: inline-block;
        transition: background 0.3s;
      }

      .back-btn:hover {
        background: #5568d3;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-icon">❌</div>
      <h1>Đăng Nhập Thất Bại</h1>
      <p class="error-message" th:text="${error}">
        Có lỗi xảy ra khi đăng nhập
      </p>
      <a href="/oauth2/authorization/google" class="back-btn">Thử Lại</a>
    </div>
  </body>
</html>
